services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # DynamoDB Local — BFF のセッション/一時 state ストア（本番は CDK の DynamoDB テーブル）。
  # -sharedDb で単一テーブルを共有、-inMemory なので停止でデータは消える（dev 用途で十分）。
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: '-jar DynamoDBLocal.jar -inMemory -sharedDb'
    ports:
      - '8000:8000'

  # dynamodb-init — セッションテーブルを作成するワンショットコンテナ（冪等）。
  # -inMemory なので dynamodb 再作成のたびにテーブルは消えるため毎起動で走らせる。
  # 既存テーブルがあればスキップ。`docker compose up --wait` で完了を待てる。
  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: ap-northeast-1
      SESSION_TABLE_NAME: sessions
    entrypoint: ['/bin/sh', '/init/init.sh']
    volumes:
      - ./docker/dynamodb/init.sh:/init/init.sh:ro
    restart: 'no'

  # oidc-server-mock — ローカル用の OIDC プロバイダ（本番は Cognito Hosted UI）。Duende IdentityServer ベース。
  # BFF は OIDC 標準フローで実装しているため、環境変数で URL を差し替えるだけで同一コードで動く。
  # member/admin を email 付きで事前定義し、ログイン画面でユーザーを選べる
  # （設定は docker/oidc-server-mock/{clients,users}.json）。エンドポイントは Duende 形式
  # （/connect/authorize・/connect/token・/.well-known/openid-configuration/jwks）。
  oidc-server-mock:
    image: ghcr.io/soluto/oidc-server-mock:0.8.6
    ports:
      - '8080:80'
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # AlwaysIncludeUserClaimsInIdToken=true（clients.json）で email を id_token に載せる。
      # Cookie は SameSite=Lax にする。既定の SameSite=None は Secure 必須で、http の localhost では
      # ブラウザに破棄され、ログイン後の /connect/authorize/callback で認証が失われてログインループになる。
      SERVER_OPTIONS_INLINE: |
        {
          "AccessTokenJwtType": "JWT",
          "Discovery": { "ShowKeySet": true },
          "Authentication": {
            "CookieSameSiteMode": "Lax",
            "CheckSessionCookieSameSiteMode": "Lax"
          }
        }
      LOGIN_OPTIONS_INLINE: |
        { "AllowRememberLogin": false }
      LOGOUT_OPTIONS_INLINE: |
        { "AutomaticRedirectAfterSignOut": true }
      CLIENTS_CONFIGURATION_PATH: /config/clients.json
      USERS_CONFIGURATION_PATH: /config/users.json
    volumes:
      - ./docker/oidc-server-mock/clients.json:/config/clients.json:ro
      - ./docker/oidc-server-mock/users.json:/config/users.json:ro

volumes:
  db_data:
