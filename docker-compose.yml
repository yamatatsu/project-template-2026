services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # DynamoDB Local — BFF のセッション/一時 state ストア（本番は CDK の DynamoDB テーブル）。
  # -sharedDb で単一テーブルを共有、-inMemory なので停止でデータは消える（dev 用途で十分）。
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: '-jar DynamoDBLocal.jar -inMemory -sharedDb'
    ports:
      - '8000:8000'

  # dynamodb-init — セッションテーブルを作成するワンショットコンテナ（冪等）。
  # -inMemory なので dynamodb 再作成のたびにテーブルは消えるため毎起動で走らせる。
  # 既存テーブルがあればスキップ。`docker compose up --wait` で完了を待てる。
  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: ap-northeast-1
      SESSION_TABLE_NAME: sessions
    entrypoint: ['/bin/sh', '/init/init.sh']
    volumes:
      - ./docker/dynamodb/init.sh:/init/init.sh:ro
    restart: 'no'

  # mock-oauth2-server — ローカル用の OIDC プロバイダ（本番は Cognito Hosted UI）。
  # BFF は OIDC 標準フローで実装しているため、環境変数で URL を差し替えるだけで同一コードで動く。
  # interactiveLogin=true でログイン画面が出て、入力したユーザー名が sub/email に反映される。
  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - '8080:8080'
    environment:
      JSON_CONFIG_PATH: /config/mock-oauth2-config.json
    volumes:
      - ./docker/mock-oauth2-server/config.json:/config/mock-oauth2-config.json:ro

volumes:
  db_data:
